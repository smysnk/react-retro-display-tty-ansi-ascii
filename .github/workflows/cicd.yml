name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      publish_npm:
        description: "Publish the npm package after validation"
        required: false
        default: true
        type: boolean

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  ansi-fidelity:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Upgrade npm
        run: npm install --global npm@latest

      - name: Enable Corepack
        run: corepack enable

      - name: Activate project Yarn
        run: corepack prepare "$(node -p 'require("./package.json").packageManager')" --activate

      - name: Check Yarn version
        run: yarn --version

      - name: Install dependencies
        run: yarn install --immutable

      - name: Detect browser executable
        id: browser
        shell: bash
        run: |
          for candidate in \
            /usr/bin/google-chrome \
            /usr/bin/google-chrome-stable \
            /usr/bin/chromium \
            /usr/bin/chromium-browser
          do
            if [ -x "$candidate" ]; then
              echo "path=$candidate" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          done
          echo "No Chrome or Chromium executable found on the runner." >&2
          exit 1

      - name: Run terminal conformance regression suite
        run: yarn test:conformance

      - name: Build Storybook for ANSI browser fidelity
        run: yarn storybook:build

      - name: Run ANSI browser fidelity suite
        env:
          CHROME_PATH: ${{ steps.browser.outputs.path }}
        run: yarn test:e2e:ansi-display:built

      - name: Run TTY terminal-app fidelity suite
        env:
          CHROME_PATH: ${{ steps.browser.outputs.path }}
        run: yarn node --test ./e2e/tty-*.test.mjs

      - name: Verify published ANSI support report
        run: yarn check:ansi-display-report

  ci:
    if: github.ref == 'refs/heads/main'
    needs: ansi-fidelity
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Upgrade npm
        run: npm install --global npm@latest

      - name: Enable Corepack
        run: corepack enable

      - name: Activate project Yarn
        run: corepack prepare "$(node -p 'require("./package.json").packageManager')" --activate

      - name: Check Yarn version
        run: yarn --version

      - name: Install dependencies
        run: yarn install --immutable

      - name: Run terminal conformance regression suite
        run: yarn test:conformance

      - name: Detect browser executable
        id: browser
        shell: bash
        run: |
          for candidate in \
            /usr/bin/google-chrome \
            /usr/bin/google-chrome-stable \
            /usr/bin/chromium \
            /usr/bin/chromium-browser
          do
            if [ -x "$candidate" ]; then
              echo "path=$candidate" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          done
          echo "No Chrome or Chromium executable found on the runner." >&2
          exit 1

      - name: Run browser smoke suite
        env:
          CHROME_PATH: ${{ steps.browser.outputs.path }}
        run: yarn test:e2e

      - name: Capture test-station start time
        run: echo "TEST_STATION_BUILD_STARTED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"

      - name: Run test-station report
        id: test_station
        shell: bash
        run: |
          set +e
          yarn test:coverage
          exit_code=$?
          if [ "$exit_code" -eq 0 ]; then
            status=passed
          else
            status=failed
          fi
          echo "TEST_STATION_CI_STATUS=$status" >> "$GITHUB_ENV"
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Publish test-station summary
        if: always() && hashFiles('.test-results/test-station/report.json') != ''
        run: |
          node --input-type=module <<'EOF' >> "$GITHUB_STEP_SUMMARY"
          import fs from "node:fs";
          const report = JSON.parse(fs.readFileSync(".test-results/test-station/report.json", "utf8"));
          const summary = report.summary || {};
          const coveragePct = summary.coverage?.lines?.pct;
          console.log("### Test Station Summary");
          console.log("");
          console.log(`- Packages: ${summary.totalPackages ?? 0}`);
          console.log(`- Suites: ${summary.totalSuites ?? 0}`);
          console.log(`- Tests: ${summary.totalTests ?? 0}`);
          console.log(`- Failed tests: ${summary.failedTests ?? 0}`);
          console.log(`- Failed packages: ${summary.failedPackages ?? 0}`);
          console.log(`- Line coverage: ${Number.isFinite(coveragePct) ? `${coveragePct}%` : "n/a"}`);
          EOF

      - name: Publish test-station ingest
        if: always() && hashFiles('.test-results/test-station/report.json') != ''
        env:
          TEST_STATION_INGEST_ENDPOINT: https://test-station.smysnk.com/api/ingest
          TEST_STATION_INGEST_PROJECT_KEY: react-retro-display-tty-ansi-ascii
          TEST_STATION_INGEST_SHARED_KEY: ${{ secrets.TEST_STATION_INGEST_SHARED_KEY }}
        run: |
          if [ -z "$TEST_STATION_INGEST_SHARED_KEY" ]; then
            echo "Skipping test-station ingest: TEST_STATION_INGEST_SHARED_KEY is not configured."
            exit 0
          fi
          completed_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          export TEST_STATION_BUILD_COMPLETED_AT="$completed_at"
          echo "TEST_STATION_BUILD_COMPLETED_AT=$completed_at" >> "$GITHUB_ENV"
          node ./scripts/test-station/publish-ingest-report.mjs

      - name: Upload test artifacts
        if: always() && hashFiles('.test-results/test-station/report.json') != ''
        uses: actions/upload-artifact@v6
        with:
          name: test-station-results
          path: .test-results/test-station
          retention-days: 14

      - name: Fail if report detected regressions
        if: always()
        shell: bash
        run: |
          exit_code="${{ steps.test_station.outputs.exit_code }}"
          if [ -z "$exit_code" ]; then
            echo "No test-station exit code was reported; defaulting to success."
            exit 0
          fi
          exit "$exit_code"

      - name: Build Storybook for GitHub Pages
        env:
          STORYBOOK_BASE_PATH: /react-retro-display-tty-ansi-ascii/
        run: yarn storybook:build

      - name: Build test-station badge payloads
        run: |
          npx --yes @test-station/cli@0.2.40 pages --input ./.test-results/test-station/report.json --output ./.tmp-test-station-pages
          mkdir -p storybook-static/badges
          cp -R ./.tmp-test-station-pages/badges/. storybook-static/badges/

      - name: Upload Storybook Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: storybook-static

      - name: Deploy Storybook to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Set npm package version from build number
        env:
          BUILD_NUMBER: ${{ github.run_number }}
          VERSION_MAJOR: ${{ vars.NPM_VERSION_MAJOR || '0' }}
          VERSION_MINOR: ${{ vars.NPM_VERSION_MINOR || '1' }}
          PATCH_MODE: ${{ vars.NPM_VERSION_PATCH_MODE || 'build' }}
          PATCH_FIXED: ${{ vars.NPM_VERSION_PATCH_FIXED }}
        run: bash ./scripts/release/set-version-from-build.sh

      - name: Validate npm release package
        shell: bash
        run: bash ./scripts/release/release-npm-package.sh

      - name: Check whether this version is already published
        id: package_version
        shell: bash
        run: |
          package_name="$(node -p "require('./package.json').name")"
          package_version="$(node -p "require('./package.json').version")"

          echo "package_name=$package_name" >> "$GITHUB_OUTPUT"
          echo "package_version=$package_version" >> "$GITHUB_OUTPUT"

          if npm view "$package_name@$package_version" version >/dev/null 2>&1; then
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            echo "Package $package_name@$package_version is already on npm. Skipping publish." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
            echo "Package $package_name@$package_version is not on npm yet. Publishing after checks pass." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Build package for npm publish
        if: steps.package_version.outputs.should_publish == 'true'
        run: yarn build

      - name: Publish npm package
        if: steps.package_version.outputs.should_publish == 'true' && (github.event_name == 'push' || inputs.publish_npm)
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_PUBLISH: "1"
          NPM_PROVENANCE: "1"
        run: bash ./scripts/release/release-npm-package.sh

      - name: Build GitHub release notes
        run: |
          cat > .github-release-notes.md <<EOF
          Release for \`${{ steps.package_version.outputs.package_name }}@${{ steps.package_version.outputs.package_version }}\`

          - Commit: \`${{ github.sha }}\`
          - npm: https://www.npmjs.com/package/${{ steps.package_version.outputs.package_name }}/v/${{ steps.package_version.outputs.package_version }}
          - Storybook: https://smysnk.github.io/react-retro-display-tty-ansi-ascii/
          EOF

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: v${{ steps.package_version.outputs.package_version }}
          RELEASE_TITLE: react-retro-display-tty-ansi-ascii v${{ steps.package_version.outputs.package_version }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" \
              --title "$RELEASE_TITLE" \
              --notes-file .github-release-notes.md
          else
            gh release create "$RELEASE_TAG" \
              --target "${GITHUB_SHA}" \
              --title "$RELEASE_TITLE" \
              --notes-file .github-release-notes.md
          fi
