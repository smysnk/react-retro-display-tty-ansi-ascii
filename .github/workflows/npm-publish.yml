name: Publish npm Package

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Enable Corepack
        run: corepack enable

      - name: Activate project Yarn
        run: corepack prepare "$(node -p 'require("./package.json").packageManager')" --activate

      - name: Check Yarn version
        run: yarn --version

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build package
        run: yarn build

      - name: Run unit tests
        run: yarn test

      - name: Build Storybook
        run: yarn storybook:build

      - name: Check whether this version is already published
        id: package_version
        shell: bash
        run: |
          package_name="$(node -p "require('./package.json').name")"
          package_version="$(node -p "require('./package.json').version")"

          echo "package_name=$package_name" >> "$GITHUB_OUTPUT"
          echo "package_version=$package_version" >> "$GITHUB_OUTPUT"

          if npm view "$package_name@$package_version" version >/dev/null 2>&1; then
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            echo "Package $package_name@$package_version is already on npm. Skipping publish." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
            echo "Package $package_name@$package_version is not on npm yet. Publishing after checks pass." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Publish package to npm
        if: steps.package_version.outputs.should_publish == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --provenance
